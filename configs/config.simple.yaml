providers:
  openai:
    api_key: "${OPENAI_API_KEY}"

routing:
  default_strategy: "weighted"
  routes:
    - name: "default"
      targets:
        - provider: openai
          model: gpt-5.2

data_sharing:  
  enabled: true # disabled by default
  share_prompts: true # disabled by default
  share_responses: true # disabled by default
  gateway_id: "${LUNARGATE_GATEWAY_ID}"
  api_key: "${LUNARGATE_GATEWAY_API_KEY}"
